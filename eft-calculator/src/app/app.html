<div class="calculator-container">
  <div *ngIf="isLoading" style="text-align: center; padding: 50px;">
    <h2>データを読み込み中...</h2>
    <p>assets/data/ 内のJSONファイルを確認しています</p>
  </div>

  <ng-container *ngIf="!isLoading">
    <header>
      <h1>EFT 弾薬＆アーマーシミュレーター</h1>
    </header>

    <div class="selection-area">
      <div class="panel">
        <h2>🛡️ 敵のアーマー</h2>
        <select [(ngModel)]="selectedArmor">
          <option *ngFor="let armor of armors" [ngValue]="armor">
            Class {{ armor.classLevel }} : {{ armor.name }}
          </option>
        </select>
      </div>

      <div class="panel">
        <h2>🔫 使用する弾薬</h2>
        <select [(ngModel)]="selectedAmmo">
          <option *ngFor="let ammo of ammos" [ngValue]="ammo">
            {{ ammo.caliber }} - {{ ammo.name }}
          </option>
        </select>
      </div>
    </div>

    <div class="result-area" *ngIf="selectedArmor && selectedAmmo">
      <div class="result-card">
        <h3>初弾貫通確率</h3>
        <p [style.color]="chanceColor" style="font-size: 3em; font-weight: bold; margin: 10px 0;">
          {{ penetrationChance }}%
        </p>
      </div>

      <div class="result-card">
        <h3>キルに必要な弾数 (胸部)</h3>
        <p style="font-size: 2em; color: #e74c3c; font-weight: bold; margin: 10px 0;">
          {{ shotsToKillThorax }}
        </p>
      </div>
    </div>
  </ng-container>
</div>
